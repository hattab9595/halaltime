<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Калькулятор рассрочки</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.js"></script>

<style>
body{background:#0f172a;margin:0;font-family:system-ui;color:white}
.custom-shadow{box-shadow:0 20px 50px rgba(0,0,0,.5)}
</style>
</head>

<body>
<div id="root"></div>

<script>
const e = React.createElement;
const {useState,useEffect,useRef} = React;

function Icon(props){
  const ref = useRef();

  useEffect(()=>{
    if(window.lucide){
      window.lucide.createIcons();
    }
  });

  return e("i",{
    "data-lucide":props.name,
    style:{width:props.size,height:props.size},
    ref:ref,
    className:props.className
  });
}

function App(){

const [totalAmount,setTotalAmount]=useState(0);
const [hasDownPayment,setHasDownPayment]=useState(true);
const [months,setMonths]=useState(3);

const getConditions=(m,withDP)=>{
if(withDP){
switch(m){
case 3:return{rate:0.08,min:20000,max:500000};
case 6:return{rate:0.16,min:20000,max:500000};
case 9:return{rate:0.23,min:20000,max:500000};
case 12:return{rate:0.30,min:20000,max:500000};
}
}else{
const r={3:0.12,6:0.22,9:0.33,12:0.42};
return{rate:r[m],min:20000,max:120000};
}
};

const c=getConditions(months,hasDownPayment);

const valid = totalAmount>=c.min && totalAmount<=c.max;

const markup=totalAmount*c.rate;
const total=totalAmount+markup;
const down=hasDownPayment?total*0.2:0;
const monthly=(total-down)/months;

return e("div",{className:"min-h-screen bg-slate-900 flex justify-center p-4"},
e("div",{className:"w-full max-w-xl bg-slate-900 custom-shadow rounded-3xl overflow-hidden border border-slate-800"},

// HEADER
e("div",{className:"bg-indigo-600 p-5 font-bold text-xl flex gap-2 items-center"},
e(Icon,{name:"calculator",size:22}),
"Рассрочка"
),

// BODY
e("div",{className:"p-5 space-y-5"},

// INPUT
e("input",{
value:totalAmount||"",
onChange:(e)=>setTotalAmount(Number(e.target.value.replace(/\D/g,"")||0)),
placeholder:"Сумма",
className:"w-full p-4 text-xl bg-slate-800 rounded-xl"
}),

// TOGGLE
e("div",{className:"flex gap-2"},
e("button",{onClick:()=>setHasDownPayment(true),
className:`flex-1 p-2 rounded-xl ${hasDownPayment?"bg-indigo-600":"bg-slate-800"}`},
"Со взносом"),
e("button",{onClick:()=>setHasDownPayment(false),
className:`flex-1 p-2 rounded-xl ${!hasDownPayment?"bg-indigo-600":"bg-slate-800"}`},
"Без взноса")
),

// MONTHS
e("div",{className:"grid grid-cols-4 gap-2"},
[3,6,9,12].map(m=>
e("button",{key:m,onClick:()=>setMonths(m),
className:`p-3 rounded-xl ${months===m?"bg-indigo-600":"bg-slate-800"}`},
m+"м")
)
),

// RESULT
valid && e("div",{className:"bg-slate-800 p-4 rounded-xl space-y-2"},

hasDownPayment && e("div",{className:"flex justify-between"},
"Взнос",Math.round(down).toLocaleString()+" ₽"
),

e("div",{className:"flex justify-between"},
"Итого",Math.round(total).toLocaleString()+" ₽"
),

e("div",null,
Array.from({length:months}).map((_,i)=>
e("div",{key:i,className:"flex justify-between text-sm"},
(i+1)+" мес",Math.round(monthly).toLocaleString()+" ₽"
))
)
),

// BUTTON
valid && e("button",{className:"w-full bg-indigo-600 p-4 rounded-xl font-bold"},
"Отправить клиенту"
)

)
)
);
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>

</body>
</html>
