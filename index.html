<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор рассрочки</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.js"></script>

<style>
body{
background:#0f172a;
margin:0;
font-family:system-ui;
}
.custom-shadow{
box-shadow:0 20px 50px rgba(0,0,0,.5);
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const e = React.createElement;
const {useState,useEffect} = React;

/* ICON */
function Icon({name,size=24,className=""}){
useEffect(()=>{
if(window.lucide) window.lucide.createIcons();
});

return e("i",{
"data-lucide":name,
style:{width:size,height:size},
className
});
}

function App(){

const [amount,setAmount]=useState(0);
const [dp,setDp]=useState(true);
const [months,setMonths]=useState(3);

function getRate(m,dp){
if(dp){
return {3:0.08,6:0.16,9:0.23,12:0.30}[m];
}
return {3:0.12,6:0.22,9:0.33,12:0.42}[m];
}

const rate=getRate(months,dp);
const total=amount + amount*rate;
const down=dp?total*0.2:0;
const monthly=(total-down)/months;

const valid=amount>=20000 && amount<= (dp?500000:120000);

/* ✅ КНОПКА "ОТПРАВИТЬ КЛИЕНТУ" */
function shareCalc(){

let text =
`📋 ГРАФИК ПЛАТЕЖЕЙ

Сумма: ${amount.toLocaleString("ru-RU")} ₽
Срок: ${months} мес.
Итого: ${Math.round(total).toLocaleString("ru-RU")} ₽

`;

if(dp){
text += `Первый взнос: ${Math.round(down).toLocaleString("ru-RU")} ₽

`;
}

text += `ПЛАТЕЖИ:
`;

for(let i=1;i<=months;i++){
text += `${i} месяц: ${Math.round(monthly).toLocaleString("ru-RU")} ₽
`;
}

if(navigator.share){
navigator.share({
title:"График платежей",
text
}).catch(copyFallback);
}else{
copyFallback();
}

function copyFallback(){
navigator.clipboard.writeText(text);
alert("Скопировано в буфер");
}
}

const text =
`📋 РАССРОЧКА

Сумма: ${amount.toLocaleString("ru-RU")} ₽
Срок: ${months} мес.
Итого: ${Math.round(total).toLocaleString("ru-RU")} ₽`;

if(navigator.share){
navigator.share({
title:"Рассрочка",
text
}).catch(copyFallback);
}else{
copyFallback();
}

function copyFallback(){
navigator.clipboard.writeText(text);
alert("Скопировано в буфер");
}
}

return e("div",{className:"min-h-screen bg-slate-900 text-white flex justify-center p-4"},

e("div",{className:"w-full max-w-xl bg-slate-900 custom-shadow rounded-3xl overflow-hidden border border-slate-800"},

/* HEADER */
e("div",{className:"bg-indigo-600 p-6 flex gap-3 items-center"},
e(Icon,{name:"calculator",size:24}),
e("h1",{className:"text-xl font-bold uppercase"},"Рассрочка")
),

e("div",{className:"p-5 space-y-6"},

/* INPUT */
e("input",{
value:amount?amount.toLocaleString("ru-RU"):"",
onChange:(e)=>setAmount(Number(e.target.value.replace(/\D/g,"")||0)),
placeholder:"Сумма товара",
className:"w-full p-4 bg-slate-800 rounded-2xl text-xl font-bold outline-none"
}),

/* TOGGLE */
e("div",{className:"flex bg-slate-800 p-1 rounded-xl"},
e("button",{
onClick:()=>setDp(true),
className:`flex-1 py-2 rounded-lg font-bold ${dp?"bg-indigo-600":"text-slate-500"}`
},"Со взносом"),

e("button",{
onClick:()=>setDp(false),
className:`flex-1 py-2 rounded-lg font-bold ${!dp?"bg-indigo-600":"text-slate-500"}`
},"Без взноса")
),

/* MONTHS */
e("div",{className:"grid grid-cols-4 gap-2"},
[3,6,9,12].map(m=>
e("button",{
key:m,
onClick:()=>setMonths(m),
className:`py-3 rounded-xl border-2 ${
months===m
?"border-indigo-600 bg-indigo-600/10 text-indigo-400"
:"border-slate-800 text-slate-500"
}`
},
e("div",{className:"text-sm font-bold"},m+"м"),
e("div",{className:"text-[10px] opacity-60"},"+"+Math.round(getRate(m,dp)*100)+"%")
)
)
),

/* RESULT */
valid && e("div",{className:"bg-slate-800/30 rounded-2xl p-4 border border-slate-800 space-y-2"},

e("div",{className:"flex justify-between text-sm text-slate-400"},
e("span",null,"Наценка"),
e("span",null,Math.round(amount*rate).toLocaleString("ru-RU")+" ₽")
),

e("div",{className:"flex justify-between font-bold"},
e("span",null,"Итого"),
e("span",null,Math.round(total).toLocaleString("ru-RU")+" ₽")
),

dp && e("div",{className:"flex justify-between bg-indigo-600/20 p-3 rounded-xl"},
e("span",null,"Взнос 20%"),
e("span",null,Math.round(down).toLocaleString("ru-RU")+" ₽")
),

e("div",{className:"space-y-2"},
Array.from({length:months}).map((_,i)=>
e("div",{key:i,className:"flex justify-between bg-slate-800/50 p-3 rounded-xl text-sm"},
e("span",null,(i+1)+" платеж"),
e("span",null,Math.round(monthly).toLocaleString("ru-RU")+" ₽")
)
)
)
),

/* BUTTON */
valid && e("button",{
onClick:shareCalc,
className:"w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold uppercase"
},
"Отправить клиенту")

)
)
);
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>

</body>
</html>
